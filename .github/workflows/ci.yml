name: CI/CD — Portfolio Jérémie Henri

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Type check ──────────────────────────
  quality:
    name: Qualité du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript — vérification des types
        run: npx tsc --noEmit

      - name: Prettier — vérification du formatage
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}"

  # ── Build ──────────────────────────────────────
  build:
    name: Build de production
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_STRIPE_PK: ${{ secrets.VITE_STRIPE_PK }}

      - name: Vérifier la taille du bundle
        run: du -sh dist/assets/*.js | sort -h

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Le déploiement est géré par l'intégration Git native de Vercel
  # (Vercel → Settings → Git) : chaque push sur main déclenche un déploiement.
  # Ce CI sert de contrôle qualité (lint, types, format, build).
