<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000000;--sidebar:#0d0d0d;--card:#0d0d0d;--card2:#111111;--border:rgba(255,255,255,0.1);--accent:#7c6af7;--a2:#9f91fa;--text:#ffffff;--muted:rgba(255,255,255,0.6);--green:#22c55e;--orange:#f97316;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6}

#login-screen{position:fixed;inset:0;background:#000000;display:flex;align-items:center;justify-content:center;z-index:1000}
.lc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:380px;text-align:center}
.ll{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-size:1.5rem;font-weight:800;margin-bottom:.25rem;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ls{font-size:13px;color:var(--muted);margin-bottom:2rem}

.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--a2));color:#0f0f17;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.lhint{font-size:12px;color:var(--muted);margin-top:12px}
.lerr{color:var(--red);font-size:12px;margin-top:8px;display:none}
.app{display:flex;min-height:100vh}
.sb{width:240px;background:var(--sidebar);border-right:1px solid var(--border);padding:1.25rem 1rem;display:flex;flex-direction:column;gap:2px;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto}
.sblogo{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-size:1.05rem;font-weight:800;padding:.5rem .75rem;margin-bottom:.75rem;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.ni.active{background:rgba(124,106,247,.12);border:1px solid rgba(124,106,247,.2);color:var(--accent)}
.nb{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:100px}
.nb.red{background:var(--red)}
.sbf{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.upill{display:flex;align-items:center;gap:10px;padding:.75rem;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border)}
.uavt{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0f0f17;flex-shrink:0}
.uname{font-size:13px;font-weight:500;color:var(--text)}
.urole{font-size:11px;color:var(--muted)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(15,15,23,.8);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10}
.topbar-title{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;font-size:1.05rem}
.tbr{display:flex;align-items:center;gap:8px}
.nob{width:36px;height:36px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;color:var(--muted)}
.nd{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--orange);border-radius:50%;border:2px solid var(--bg)}
.content{padding:1.75rem 2rem;overflow-y:auto}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:1.5rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:1.1rem}
.kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kv{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-size:1.7rem;font-weight:700;line-height:1}
.ks{font-size:12px;color:var(--muted);margin-top:4px}
.ks.up{color:var(--green)} .ks.dn{color:var(--red)}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:1.5rem}
.thead2{padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.ttitle{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;font-size:.95rem}
table{width:100%;border-collapse:collapse}
th{padding:9px 1.1rem;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;background:rgba(255,255,255,.02)}
td{padding:11px 1.1rem;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.bg{background:rgba(34,197,94,.1);color:var(--green)} .by{background:rgba(234,179,8,.1);color:var(--yellow)}
.br2{background:rgba(239,68,68,.1);color:var(--red)} .bb{background:rgba(59,130,246,.1);color:var(--blue)}
.bpurp{background:rgba(124,106,247,.1);color:var(--accent)} .borg{background:rgba(249,115,22,.1);color:var(--orange)}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:1.25rem;margin-bottom:1.5rem}
.cheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.ctitle{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;font-size:.95rem}
.ctabs{display:flex;gap:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:3px}
.ctab{padding:4px 12px;border-radius:6px;font-size:11px;font-family:inherit;border:none;cursor:pointer;transition:all .2s;color:var(--muted);background:none}
.ctab.active{background:var(--accent);color:#fff;font-weight:700}
.barchart{display:flex;align-items:flex-end;gap:8px;height:130px}
.barw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.barf{border-radius:5px 5px 0 0;width:100%;transition:all .5s;background:linear-gradient(to top,var(--accent),rgba(94,234,212,.8))}
.barl{font-size:10px;color:var(--muted)} .barv{font-size:10px;font-weight:600;color:var(--text)}
.fsec{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:1.5rem;margin-bottom:1.5rem}
.fstitle{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;font-size:.95rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px} .fgfull{grid-column:span 2}
.flabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.finp{padding:10px 13px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.finp:focus{border-color:rgba(124,106,247,.5)} .finp::placeholder{color:var(--muted)}
.btn{padding:8px 16px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btnp{background:linear-gradient(135deg,var(--accent),var(--a2));color:#0f0f17} .btnp:hover{opacity:.9}
.btno{background:transparent;border:1px solid var(--border);color:var(--text)} .btno:hover{border-color:var(--accent);color:var(--accent)}
.btnd{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btnsm{padding:5px 11px;font-size:11px;border-radius:7px}
.btngh{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)} .btngh:hover{color:var(--text)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mhead{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mhead h3{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;color:var(--accent)}
.mbody{padding:1.5rem;display:flex;flex-direction:column;gap:12px}
.msglayout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 180px);background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.msglist{border-right:1px solid var(--border);overflow-y:auto}
.msgitem{padding:.875rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.msgitem:hover,.msgitem.active{background:rgba(124,106,247,.08)} .msgitem.unread{border-left:3px solid var(--accent)}
.msgname{font-weight:600;font-size:13px;margin-bottom:3px;display:flex;justify-content:space-between}
.msgprev{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msgtime{font-size:10px;color:var(--muted)}
.chatarea{display:flex;flex-direction:column}
.chatheader{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chatheader .cname{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;font-size:.95rem}
.chatheader .crole{font-size:12px;color:var(--muted)}
.msgsarea{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:calc(100vh - 340px)}
.bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.55}
.bubble.me{background:linear-gradient(135deg,rgba(124,106,247,.25),rgba(94,234,212,.1));border:1px solid rgba(124,106,247,.2);align-self:flex-end;border-bottom-right-radius:4px}
.bubble.them{background:rgba(255,255,255,.06);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.btime{font-size:10px;color:var(--muted);margin-top:4px}
.msginput{padding:1rem;border-top:1px solid var(--border);display:flex;gap:8px}
.msginp{flex:1;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
.msginp:focus{border-color:rgba(124,106,247,.4)}
.msgsend{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px}
.invpreview{background:white;color:#1a1a2e;border-radius:12px;padding:2rem;max-width:600px}
.invheader{display:flex;justify-content:space-between;align-items:start;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:2px solid #f0f0f0}
.invlogo{font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:800;font-size:1.2rem;color:var(--accent)}
.invbadge{background:rgba(124,106,247,.1);color:var(--accent);font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;margin-top:4px;display:inline-block}
.invtable{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:13px}
.invtable th{text-align:left;padding:8px 10px;background:#f8f8f8;color:#666;font-size:11px;text-transform:uppercase}
.invtable td{padding:10px;border-bottom:1px solid #f0f0f0}
.invtotal{display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-size:13px}
.invrow{display:flex;gap:3rem}
.invrow.grand{font-weight:700;font-size:15px;color:var(--accent);border-top:2px solid #f0f0f0;padding-top:8px;margin-top:4px}
.notiflist{display:flex;flex-direction:column;gap:8px}
.notifitem{display:flex;gap:12px;align-items:start;padding:1rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer}
.notifitem.unread{border-left:3px solid var(--accent);background:rgba(124,106,247,.05)}
.notificon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notifit{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.notifid{font-size:12px;color:var(--muted);line-height:1.5}
.notiftime{font-size:10px;color:var(--muted);margin-top:4px}
.sinp{padding:7px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;outline:none;width:180px}
.sinp:focus{border-color:rgba(124,106,247,.4)}
.scats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem}
.scat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;cursor:pointer;transition:all .2s}
.scat:hover{border-color:var(--accent);background:rgba(124,106,247,.08)}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast-s{background:var(--green);color:#fff} .toast-e{background:var(--red);color:#fff} .toast-i{background:var(--accent);color:#fff}
@media(max-width:900px){
  .sb{display:none}
  .msglayout{grid-template-columns:1fr}
  .msglist{display:none}
  .content{padding:1rem}
  .topbar{padding:.75rem 1rem}
  .tcard{overflow-x:auto}
  table{min-width:480px}
  .fgrid{grid-template-columns:1fr}
  .fgfull{grid-column:span 1}
  .scats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .topbar-title{font-size:.9rem}
  .kv{font-size:1.3rem}
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .barchart{gap:4px}
}
select{background:var(--card)!important;color:var(--text)!important;color-scheme:dark;border:1px solid var(--border)!important;border-radius:8px}
select option{background:var(--card)!important;color:var(--text)!important}
</style>
</head>

<div id="login-screen">

const CHART_DATA={
  '7j':{data:[180,320,290,480,380,620,580],labels:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim']},
  '30j':{data:[3240,4180,3970,5280],labels:['Sem 1','Sem 2','Sem 3','Sem 4']},

}
function renderChart(key){
  const chart=document.getElementById('main-chart');if(!chart)return
  const {data,labels}=CHART_DATA[key]
  const max=Math.max(...data)
  const fmt=v=>v>=1000?(v/1000).toFixed(1)+'k':v
  chart.innerHTML=labels.map((d,i)=>`<div class="barw"><span class="barv">${fmt(data[i])}€</span><div class="barf" style="height:${Math.round((data[i]/max)*110)}px"></div><span class="barl">${d}</span></div>`).join('')
}
function switchTab(el,key){
  el.closest('.ctabs').querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  renderChart(key)
}

          </div>`).join('')}
      </div>
      <div class="chatarea" id="chatarea">${renderChat(conv)}</div>
    </div>`
}
function renderChat(conv){
  if(!conv)return''
  return`
    <div class="chatheader">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0f0f17">${conv.avatar}</div>
      <div><div class="cname">${conv.from}</div><div class="crole">${conv.role}</div></div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)"></span>
        <span style="font-size:12px;color:var(--green)">En ligne</span>
      </div>
    </div>
    <div class="msgsarea" id="msgsarea">${conv.msgs.map(m=>`
      <div>
        <div class="bubble ${m.from}">${m.text}</div>
        <div class="btime" style="text-align:${m.from==='me'?'right':'left'}">${m.time}</div>
      </div>`).join('')}
    </div>
    <div class="msginput">
      <input class="msginp" id="msginp" placeholder="Tapez votre message..." onkeydown="if(event.key==='Enter')sendMsg(${conv.id})">
      <button class="msgsend" onclick="sendMsg(${conv.id})">Envoyer</button>
    </div>`
}
function openConv(id){
  curMsgId=id
  const conv=DB.messages.find(m=>m.id===id)
  if(conv)conv.unread=false
  save(DB);updateBadges()
  document.getElementById('chatarea').innerHTML=renderChat(conv)
  document.querySelectorAll('.msgitem').forEach((el,i)=>{
    el.classList.toggle('active',DB.messages[i]?.id===id)
    if(DB.messages[i]?.id===id)el.classList.remove('unread')
  })
  setTimeout(()=>{const a=document.getElementById('msgsarea');if(a)a.scrollTop=a.scrollHeight},50)
}
function sendMsg(cid){
  const inp=document.getElementById('msginp'),text=inp?.value.trim();if(!text)return
  const conv=DB.messages.find(m=>m.id===cid);if(!conv)return
  const now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})
  conv.msgs.push({text,from:'me',time:"Aujourd'hui, "+now})
  save(DB);inp.value=''
  const area=document.getElementById('msgsarea')
  if(area){area.innerHTML=conv.msgs.map(m=>`<div><div class="bubble ${m.from}">${m.text}</div><div class="btime" style="text-align:${m.from==='me'?'right':'left'}">${m.time}</div></div>`).join('');area.scrollTop=area.scrollHeight}
  setTimeout(()=>{
    const r=['Je prends note, je reviens vers vous rapidement !','Bien reçu 👍','Aucun problème, je m\'en occupe.','Parfait !']
    conv.msgs.push({text:r[Math.floor(Math.random()*r.length)],from:'them',time:"Aujourd'hui, "+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})})
    save(DB)
    const a=document.getElementById('msgsarea')
    if(a){a.innerHTML=conv.msgs.map(m=>`<div><div class="bubble ${m.from}">${m.text}</div><div class="btime" style="text-align:${m.from==='me'?'right':'left'}">${m.time}</div></div>`).join('');a.scrollTop=a.scrollHeight}
  },1500)
}

// ── PROFIL ───────────────────────
function rProfil(){
  const u=DB.user
  document.getElementById('pg').innerHTML=`
    <div style="display:grid;grid-template-columns:220px 1fr;gap:1.5rem;align-items:start">
      <div class="fsec" style="text-align:center">
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:#0f0f17;margin:0 auto 1rem">${u.avatar||u.name.slice(0,2)}</div>
        <div style="font-family:Inter,sans-serif;letter-spacing:-0.02em;font-weight:700;font-size:1rem;margin-bottom:4px">${u.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:1rem">Client Pro</div>
        <button class="btn btno" style="width:100%;justify-content:center" onclick="toast('Fonctionnalité bientôt disponible','info')">📷 Changer la photo</button>
      </div>
      <div>
        <div class="fsec">
          <div class="fstitle">Informations personnelles</div>
          <div class="fgrid">
            <div class="fg"><label class="flabel">Prénom & Nom</label><input id="u-name" class="finp" value="${u.name}"></div>
            <div class="fg"><label class="flabel">Email</label><input id="u-email" class="finp" type="email" value="${u.email}"></div>
            <div class="fg"><label class="flabel">Téléphone</label><input id="u-phone" class="finp" value="${u.phone||''}"></div>
            <div class="fg"><label class="flabel">Entreprise</label><input id="u-company" class="finp" value="${u.company||''}"></div>
            <div class="fg fgfull"><label class="flabel">Adresse</label><input id="u-address" class="finp" value="${u.address||''}"></div>
          </div>
          <button class="btn btnp" style="margin-top:1rem" onclick="saveProfil()">💾 Sauvegarder</button>
        </div>
        <div class="fsec">
          <div class="fstitle">Sécurité</div>
          <div class="fgrid">
            <div class="fg"><label class="flabel">Mot de passe actuel</label><input class="finp" type="password" placeholder="••••••••"></div>
            <div class="fg"><label class="flabel">Nouveau mot de passe</label><input class="finp" type="password" placeholder="••••••••"></div>
          </div>
          <button class="btn btno" style="margin-top:.75rem" onclick="toast('Mot de passe mis à jour ✅','success')">Changer le mot de passe</button>
        </div>
      </div>
    </div>`
}
function saveProfil(){
  DB.user.name=document.getElementById('u-name')?.value||DB.user.name
  DB.user.email=document.getElementById('u-email')?.value||DB.user.email
  DB.user.phone=document.getElementById('u-phone')?.value||DB.user.phone
  DB.user.company=document.getElementById('u-company')?.value||DB.user.company
  DB.user.address=document.getElementById('u-address')?.value||DB.user.address
  DB.user.avatar=DB.user.name.slice(0,2).toUpperCase()
  save(DB)
  document.getElementById('uname').textContent=DB.user.name
  document.getElementById('uavt').textContent=DB.user.avatar
  toast('Profil sauvegardé ✅','success')
}

  const s=DB.settings
  document.getElementById('pg').innerHTML=`
    <div class="fsec">
      <div class="fstitle">Notifications</div>
      ${[['notifications','Notifications push',s.notifications],['emailAlerts','Alertes email (commandes, factures)',s.emailAlerts],['newsletter','Newsletter mensuelle',s.newsletter]].map(([k,l,v])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.875rem 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px">${l}</span>
          <label style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer">
            <input type="checkbox" id="s-${k}" ${v?'checked':''} style="opacity:0;width:0;height:0" onchange="DB.settings['${k}']=this.checked;save(DB)">
            <span style="position:absolute;inset:0;border-radius:24px;transition:.3s;background:${v?'var(--accent)':'rgba(255,255,255,.1)'}">
              <span style="position:absolute;height:18px;width:18px;bottom:3px;border-radius:50%;background:white;transition:.3s;left:${v?'23px':'3px'}"></span>
            </span>
          </label>
        </div>`).join('')}
    </div>
    <div class="fsec">
      <div class="fstitle">Apparence</div>
      <div class="fgrid">
        <div class="fg"><label class="flabel">Thème</label>
          <select class="finp"><option>Sombre</option><option>Clair</option></select>
        </div>
        <div class="fg"><label class="flabel">Langue</label>
          <select class="finp"><option>Français</option><option>English</option></select>
        </div>
      </div>
    </div>
    <div class="fsec" style="border-color:rgba(239,68,68,.2)">
      <div class="fstitle" style="color:var(--red)">Zone dangereuse</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Ces actions sont irréversibles.</p>
      <button class="btn btnd" onclick="if(confirm('Supprimer toutes vos données ?')){localStorage.removeItem('${KEY}');location.reload()}">🗑️ Supprimer mon compte</button>
    </div>`
}
function saveParams(){save(DB);toast('Paramètres sauvegardés ✅','success')}

// ── SUPPORT ──────────────────────
function rSupport(){
  document.getElementById('pg').innerHTML=`
    <div class="scats">
      ${[['🐛','Bug / Erreur'],['💡','Fonctionnalité'],['💳','Facturation'],['⚡','Performance'],['🔐','Sécurité'],['❓','Autre']].map(([ic,lb])=>`
        <div class="scat" onclick="openTicketWith('${lb}')">
          <div style="font-size:1.5rem;margin-bottom:6px">${ic}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text)">${lb}</div>
        </div>`).join('')}
    </div>
    <div class="tcard">
      <div class="thead2"><span class="ttitle">Mes tickets (${DB.tickets.length})</span></div>
      ${DB.tickets.length?`<table><thead><tr><th>ID</th><th>Sujet</th><th>Type</th><th>Date</th><th>Statut</th></tr></thead>
      <tbody>${DB.tickets.map(t=>`<tr>
        <td style="color:var(--accent);font-weight:700">${t.id}</td>
        <td>${t.subject}</td>
        <td><span class="badge bpurp">${t.type}</span></td>
        <td style="color:var(--muted)">${t.date}</td>
        <td><span class="badge ${t.statut==='résolu'?'bg':t.statut==='en cours'?'bb':'by'}">${t.statut}</span></td>
      </tr>`).join('')}</tbody></table>`:
      '<div style="text-align:center;padding:2.5rem;color:var(--muted)">🎉 Aucun ticket — tout fonctionne !</div>'}
    </div>`
}
function openTicket(){openTicketWith('')}
function openTicketWith(type){
  document.getElementById('mtitle').textContent='Nouveau ticket de support'
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><label class="flabel">Type</label>
      <select class="finp" id="t-type"><option value="">Sélectionner...</option>${['Bug / Erreur','Fonctionnalité','Facturation','Performance','Sécurité','Autre'].map(t=>`<option ${t===type?'selected':''}>${t}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="flabel">Sujet *</label><input class="finp" id="t-subj" placeholder="Décrivez votre problème..."></div>
    <div class="fg"><label class="flabel">Description *</label><textarea class="finp" id="t-desc" rows="4" placeholder="Détaillez votre demande..."></textarea></div>
    <div class="fg"><label class="flabel">Priorité</label><select class="finp" id="t-prio"><option>Normale</option><option>Haute</option><option>Urgente</option></select></div>
    <button class="btn btnp" onclick="submitTicket()">📤 Ouvrir le ticket</button>`
  openModal()
}
function submitTicket(){
  const subj=document.getElementById('t-subj').value.trim();if(!subj){toast('Sujet requis','error');return}
  DB.tickets.push({id:'SUP-'+(++DB.nextId).toString().padStart(3,'0'),type:document.getElementById('t-type').value||'Autre',subject:subj,date:new Date().toLocaleDateString('fr-FR'),statut:'ouvert'})
  save(DB);closeModal();rSupport();toast('Ticket ouvert — réponse sous 4h ✅','success')
}

// ── NOTIFICATIONS ────────────────
function rNotifs(){
  document.getElementById('pg').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <p style="font-size:13px;color:var(--muted)">${DB.notifications.filter(n=>!n.read).length} non lue(s)</p>
    </div>
    <div class="notiflist">${DB.notifications.map(n=>`
      <div class="notifitem${n.read?'':' unread'}" onclick="markRead(${n.id})">
        <div class="notificon" style="background:${n.color}">${n.icon}</div>
        <div style="flex:1">
          <div class="notifit">${n.title}</div>
          <div class="notifid">${n.desc}</div>
          <div class="notiftime">${n.time}</div>
        </div>
        ${!n.read?'<span style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px"></span>':''}
      </div>`).join('')}
    </div>`
}
function markRead(id){const n=DB.notifications.find(n=>n.id===id);if(n){n.read=true;save(DB);updateBadges();rNotifs()}}
function markAllRead(){DB.notifications.forEach(n=>n.read=true);save(DB);updateBadges();rNotifs();toast('Tout marqué comme lu','success')}

// ── UTILS ────────────────────────
function openModal(){document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
function closeModalOut(e){if(e.target===document.getElementById('modal'))closeModal()}
function toast(msg,type='success'){
  const t=document.getElementById('toast')
  t.textContent=(type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ')+msg
  t.className='toast toast-'+type+' show'
  setTimeout(()=>t.classList.remove('show'),3000)
}
</script>
